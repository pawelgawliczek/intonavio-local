name: IntonavioLocal
options:
  bundleIdPrefix: com.intonaviolocal
  deploymentTarget:
    iOS: '17.0'
    macOS: '14.0'
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: '5.9'
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: BSDVBGN72H
    CODE_SIGN_STYLE: Automatic

targets:
  IntonavioLocal:
    type: application
    platform: iOS
    sources:
      - path: Intonavio
        excludes:
          - "Resources/GeneralUser-GS/documentation/**"
          - "Resources/GeneralUser-GS/demo MIDIs/**"
          - "Resources/GeneralUser-GS/support/**"
    info:
      path: Intonavio/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        NSMicrophoneUsageDescription: 'IntonavioLocal needs microphone access to detect your singing pitch in real-time.'
        NSLocalNetworkUsageDescription: 'IntonavioLocal uses a local server to load the YouTube player.'
    entitlements:
      path: Intonavio/Intonavio.entitlements
    settings:
      base:
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: 'UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: 'UIInterfaceOrientationPortrait'
        PRODUCT_BUNDLE_IDENTIFIER: com.intonaviolocal.app
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: 'iphoneos iphonesimulator'
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false

  IntonavioLocalMac:
    type: application
    platform: macOS
    sources:
      - path: Intonavio
        excludes:
          - "Resources/GeneralUser-GS/documentation/**"
          - "Resources/GeneralUser-GS/demo MIDIs/**"
          - "Resources/GeneralUser-GS/support/**"
    info:
      path: Intonavio/Info-macOS.plist
      properties:
        NSMicrophoneUsageDescription: 'IntonavioLocal needs microphone access to detect your singing pitch in real-time.'
        NSLocalNetworkUsageDescription: 'IntonavioLocal uses a local server to load the YouTube player.'
    entitlements:
      path: Intonavio/IntonavioMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.intonaviolocal.mac
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  IntonavioLocalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IntonavioTests
    dependencies:
      - target: IntonavioLocal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.intonaviolocal.app.tests
        TEST_HOST: '$(BUILT_PRODUCTS_DIR)/IntonavioLocal.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/IntonavioLocal'
        BUNDLE_LOADER: '$(TEST_HOST)'
